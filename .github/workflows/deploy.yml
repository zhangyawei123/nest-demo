name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 120.48.191.112
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            bash /var/www/nest-demo/deploy/deploy.sh
